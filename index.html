<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 6월 상담 일정 신청</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📅 6월 1:1 상담 일정 신청</h1>
        <p class="subtitle">우리 반(1~25번) 학생들은 원하는 날짜와 시간을 선택해 주세요.</p>

        <div class="booking-section">
            <h2>✍️ 상담 예약하기</h2>
            <div class="form-group">
                <label for="student-num">학생 번호:</label>
                <select id="student-num">
                    <option value="">-- 번호 선택 --</option>
                    </select>
            </div>
            
            <div class="form-group">
                <label for="consult-date">날짜 선택 (6월):</label>
                <input type="date" id="consult-date" min="2026-06-01" max="2026-06-30">
            </div>

            <div class="form-group">
                <label for="consult-time">시간 선택:</label>
                <select id="consult-time">
                    <option value="">-- 시간대 선택 --</option>
                    <option value="am">1번: 아침 (08:40 - 08:50)</option>
                    <option value="pm">2번: 점심 (13:10 - 13:20)</option>
                </select>
            </div>

            <button id="submit-btn" onclick="bookAppointment()">예약 신청하기</button>
        </div>

        <hr>

        <div class="calendar-section">
            <h2>🗓️ 6월 상담 현황판</h2>
            <div class="calendar-grid-header">
                <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div id="calendar-days" class="calendar-grid-body">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
